
  <!-- Header -->
  <div class="admin-header">
    <h1>🔧 ממשק ניהול</h1>
    <div class="header-info">
      <span>שלום, {{ currentUser?.fullName }}</span>
      <button class="btn-back" (click)="goHome()" title="חזור לעמוד הבית">
        ← חזור לעמוד הבית
      </button>
    </div>
  </div>
<div class="admin-container">
  <!-- Tabs Navigation -->
  <div class="admin-tabs">
    <button 
      routerLink="books"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="tab-btn">
      📚 ניהול ספרים
    </button>
    <button 
      routerLink="orders"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="tab-btn">
      📦 הזמנות
    </button>
  </div>
  <!-- Content -->
  <div class="tab-content">
    <router-outlet></router-outlet>
  </div>
</div>
